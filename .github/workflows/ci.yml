name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # runs the generator's .ts natively (type stripping)
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C packages/v4 install --frozen-lockfile --ignore-workspace

      # The generated output must be reproducible from the vendored spec.
      - run: pnpm generate
      - run: git diff --exit-code packages/*/src

      - run: pnpm typecheck
      - run: pnpm build
