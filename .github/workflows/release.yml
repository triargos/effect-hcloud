name: Release

# Push to main:
#  - if there are unreleased changesets → open/update a "Version Packages" PR
#  - if there are none (i.e. that PR just merged) → publish v3 (latest) + v4 (next)
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # changesets pushes the version PR + git tags
  pull-requests: write # changesets opens the version PR
  id-token: write # OIDC → npm trusted publishing + provenance (no NPM_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # runs the generator's .ts natively
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted (tokenless) publishing + provenance require a recent npm.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C packages/v4 install --frozen-lockfile --ignore-workspace

      # Guard: committed output must match the generator + vendored spec.
      - run: pnpm generate
      - run: git diff --exit-code packages/*/src
      - run: pnpm typecheck
      - run: pnpm build

      - name: Version / publish v3 (latest)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run publish:v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — `pnpm publish` authenticates via the OIDC id-token.

      - name: Publish v4 (next)
        if: steps.changesets.outputs.published == 'true'
        run: pnpm run publish:v4
