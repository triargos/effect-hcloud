name: Release

# Push to main:
#  - if there are unreleased changesets → open/update a "Version Packages" PR
#  - if there are none (i.e. that PR just merged) → publish v3 (latest) + v4 (next)
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # changesets pushes the version PR + git tags
  pull-requests: write # changesets opens the version PR
  id-token: write # OIDC → npm trusted publishing + provenance (no NPM_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # runs the generator's .ts natively
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted (tokenless) publishing + provenance require a recent npm.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C packages/v4 install --frozen-lockfile --ignore-workspace

      # Publish committed source as-is. The regen drift-check is CI's job (ci.yml);
      # re-running `pnpm generate` here would rewrite package.json and fight the
      # Changesets version bump.
      - run: pnpm typecheck
      - run: pnpm build

      - name: Version / publish v3 (latest)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run publish:v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — publishing authenticates via the OIDC id-token.

      # v4 mirrors the current v3 version (2.<minor>.<patch>-beta.0). Publish it
      # only if that exact version isn't already on npm, so this is idempotent and
      # self-healing — it publishes the first time a v3 release lifts the v4 version
      # to a new value, and no-ops on unrelated pushes.
      - name: Publish v4 (next)
        run: |
          node scripts/set-v4-version.mjs
          VERSION="$(node -p "require('./packages/v4/package.json').version")"
          if npm view "@triargos/effect-hcloud@${VERSION}" version >/dev/null 2>&1; then
            echo "v4 ${VERSION} already published — skipping."
          else
            npm publish ./packages/v4
          fi
